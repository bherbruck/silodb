services:
  silodb:
    # Compose reuses an existing image — after pulling new commits, run
    # `docker compose up --build` or you'll serve the old binary.
    build: .
    ports:
      - "8080:8080"
    volumes:
      # hot.db + its .silodb/ parquet directory live together here.
      # A named volume works with the image's non-root user out of the
      # box; to keep the files visible on the host (e.g. to point DuckDB
      # straight at the parquet), bind-mount instead:
      #   - ./data:/data     (then: mkdir -p data && sudo chown 65532 data)
      - silodb-data:/data
    environment:
      # All optional: with no tokens set at all, the server generates an
      # admin token and prints it in the logs (changes every restart —
      # set SILODB_DDL_TOKEN in .env to make it stable).
      SILODB_READONLY_TOKEN: ${SILODB_READONLY_TOKEN:-}
      SILODB_READWRITE_TOKEN: ${SILODB_READWRITE_TOKEN:-}
      SILODB_DDL_TOKEN: ${SILODB_DDL_TOKEN:-}
      # Policy for tables auto-created by line-protocol writes.
      SILODB_DEFAULT_TIERS: ${SILODB_DEFAULT_TIERS:-1d}
      # Background maintenance interval (seconds; 0 disables).
      SILODB_MAINTAIN_SECS: ${SILODB_MAINTAIN_SECS:-60}
    restart: unless-stopped

  # Optional: Grafana with silodb pre-wired as an InfluxDB datasource
  # (silodb-server emulates the InfluxDB 1.x query API — the core plugin,
  # visual builder and autocomplete included, works out of the box).
  # Start with: docker compose --profile grafana up
  grafana:
    image: grafana/grafana:latest
    profiles: [grafana]
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      # The provisioned datasource authenticates with the readonly token —
      # set SILODB_READONLY_TOKEN in .env when using this profile.
      SILODB_READONLY_TOKEN: ${SILODB_READONLY_TOKEN:-}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    depends_on:
      - silodb
    restart: unless-stopped

volumes:
  silodb-data:
